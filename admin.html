<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ответы гостей</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{--bg:#fff8f3;--card:#fffdf9;--ink:#302724;--muted:#8a756a;--line:#ead7c9;--accent:#9f2f51;--green:#2f8a58;--red:#b23b3b;--shadow:0 20px 70px rgba(122,64,41,.10)}
    *{box-sizing:border-box;font-family:"Noto Sans",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif!important}
    body{margin:0;background:linear-gradient(180deg,#fffaf6,#fff6ef);color:var(--ink)}
    .wrap{max-width:980px;margin:0 auto;padding:22px 16px 70px}
    .head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin:10px 0 18px}.head h1{margin:0;color:var(--accent);font-size:clamp(30px,5vw,52px);line-height:1.05;letter-spacing:-.05em}.sub{margin-top:8px;color:var(--muted);font-weight:600}.btn{border:0;border-radius:18px;background:var(--accent);color:#fff;padding:15px 20px;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 12px 28px rgba(159,47,81,.20);white-space:nowrap}.btn:active{transform:translateY(1px)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 10px 30px rgba(122,64,41,.05)}.stat b{display:block;color:var(--accent);font-size:30px;letter-spacing:-.04em}.stat span{color:var(--muted);font-weight:700;font-size:13px}.list{display:grid;gap:10px}.guest{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 10px 30px rgba(122,64,41,.05);display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}.name{font-size:18px;font-weight:800;color:var(--ink)}.meta{margin-top:7px;color:var(--muted);font-weight:600;line-height:1.55}.badge{border-radius:999px;padding:9px 13px;font-weight:800;font-size:13px}.yes{background:#eef8f2;color:var(--green)}.no{background:#fff0f0;color:var(--red)}.empty{background:#fff;border:1px dashed var(--line);border-radius:24px;padding:34px;text-align:center;color:var(--muted);font-weight:700;line-height:1.6}.footer{text-align:center;color:#b1a099;font-weight:700;font-size:13px;margin-top:28px}
    @media(max-width:720px){.head{display:grid}.btn{width:100%}.stats{grid-template-columns:repeat(2,1fr)}.guest{grid-template-columns:1fr}.badge{width:max-content}.wrap{padding-top:14px}.stat b{font-size:26px}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div><h1>Ответы гостей</h1><div class="sub" id="updated">Загрузка ответов...</div></div>
      <button class="btn" onclick="downloadExcel()">Скачать Excel</button>
    </div>

    <section class="stats">
      <div class="stat"><b id="sTotal">0</b><span>Всего ответов</span></div>
      <div class="stat"><b id="sYes">0</b><span>Будут</span></div>
      <div class="stat"><b id="sNo">0</b><span>Не смогут</span></div>
      <div class="stat"><b id="sPeople">0</b><span>Персон</span></div>
    </section>

    <section class="list" id="list"></section>
    <div class="footer">created by event-link · +7 700 961 90 49</div>
  </main>
<script>
const cfg=window.EVENT_LINK_CONFIG||{};
let responses=[];
function val(row,keys,def=''){for(const k of keys){if(row && row[k]!==undefined && row[k]!==null && String(row[k]).trim()!=='') return row[k];}return def;}
function normalize(row){
  const attendance=String(val(row,['attendance','status','Будет','Ответ'],'')).toLowerCase();
  const isYes=attendance==='yes'||attendance==='да'||attendance==='буду'||attendance.includes('кел')||attendance.includes('буд');
  const isNo=attendance==='no'||attendance==='нет'||attendance.includes('смогу')||attendance.includes('алмай');
  const comp=String(val(row,['companion','withCompanion','С супругом'],'')).toLowerCase();
  const companionName=val(row,['companionName','Имя супруга','spouseName'],'');
  const withCompanion=comp==='with'||comp==='yes'||comp==='да'||comp.includes('супруг')||comp.includes('жұбай')||!!companionName;
  return {
    timestamp: val(row,['timestamp','date','Дата','submittedAt'],''),
    name: val(row,['name','Имя','Аты'],'Без имени'),
    status: isNo?'no':(isYes?'yes':val(row,['attendance','status'],'yes')),
    companion: withCompanion?'with':'alone',
    companionName,
    comment: val(row,['comment','Комментарий','Пікір'],''),
    lang: val(row,['lang'],'')
  };
}
function dateText(v){if(!v)return '';const d=new Date(v);if(isNaN(d))return String(v);return d.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function statusText(r){return r.status==='no'?'Не сможет':'Будет';}
function peopleCount(r){return r.status==='yes'?(r.companion==='with'?2:1):0;}
function render(){
  const rows=responses.map(normalize).reverse();
  const yes=rows.filter(r=>r.status==='yes').length;
  const no=rows.filter(r=>r.status==='no').length;
  const people=rows.reduce((s,r)=>s+peopleCount(r),0);
  sTotal.textContent=rows.length;sYes.textContent=yes;sNo.textContent=no;sPeople.textContent=people;
  updated.textContent=rows.length?`Последнее обновление: ${new Date().toLocaleString('ru-RU',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'})}`:'Пока ответов нет';
  if(!rows.length){list.innerHTML=`<div class="empty">Ответов пока нет.<br>${(cfg.APPS_SCRIPT_URL||'').trim()?'Открой страницу позже после первых подтверждений.':'Вставь ссылку Apps Script в файл config.js, чтобы ответы появились здесь.'}</div>`;return;}
  list.innerHTML=rows.map(r=>`<article class="guest"><div><div class="name">${esc(r.name)}${r.companionName?' + '+esc(r.companionName):''}</div><div class="meta">${dateText(r.timestamp)}${r.comment?' · '+esc(r.comment):''}<br>${r.status==='yes'?(r.companion==='with'?'С супругом/супругой':'Один/одна'):''}</div></div><div class="badge ${r.status==='yes'?'yes':'no'}">${statusText(r)}</div></article>`).join('');
}
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
window.renderAdmin=function(payload){responses=(payload&&payload.responses)||payload||[];render();};
function load(){
  const url=(cfg.APPS_SCRIPT_URL||'').trim();
  if(!url){responses=JSON.parse(localStorage.getItem('eventLinkResponses')||'[]');render();return;}
  const cb='renderAdmin';
  const s=document.createElement('script');
  s.src=url+(url.includes('?')?'&':'?')+'admin=1&callback='+cb+'&t='+Date.now();
  s.onerror=()=>{updated.textContent='Не удалось загрузить ответы';};
  document.body.appendChild(s);
}
function downloadExcel(){
  const rows=responses.map(normalize);
  if(!rows.length){alert('Пока нет ответов для скачивания');return;}
  if(!window.XLSX){alert('Excel-модуль не загрузился. Проверь интернет и открой страницу заново.');return;}
  const wb=XLSX.utils.book_new();
  const all=[['№','Дата','Имя гостя','Ответ','Формат','Имя супруга/супруги','Кол-во персон','Комментарий'],...rows.map((r,i)=>[i+1,dateText(r.timestamp),r.name,statusText(r),r.status==='yes'?(r.companion==='with'?'С супругом/супругой':'Один/одна'):'',r.companionName,peopleCount(r),r.comment])];
  const restaurant=[['№','Гость','Персон','Примечание'],...rows.filter(r=>r.status==='yes').map((r,i)=>[i+1,r.companionName?`${r.name} + ${r.companionName}`:r.name,peopleCount(r),r.comment])];
  const no=[['№','Имя','Комментарий'],...rows.filter(r=>r.status==='no').map((r,i)=>[i+1,r.name,r.comment])];
  addSheet(wb,'Ответы гостей',all,[6,18,26,16,22,26,14,36]);addSheet(wb,'Список для ресторана',restaurant,[6,34,12,36]);addSheet(wb,'Не смогут',no,[6,28,40]);
  const d=new Date().toISOString().slice(0,10);XLSX.writeFile(wb,`kudalyk_responses_${d}.xlsx`);
}
function addSheet(wb,name,data,widths){const ws=XLSX.utils.aoa_to_sheet(data);ws['!cols']=widths.map(w=>({wch:w}));XLSX.utils.book_append_sheet(wb,ws,name);}
load();
</script>
</body>
</html>
